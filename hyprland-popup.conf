# Hyprland Window Rules for aooff-popup
#
# Add these lines to your ~/.config/hypr/hyprland.conf
# Then launch the popup with: kitty --title aooff-popup aooff-popup
# (or use any terminal: alacritty --title aooff-popup -e aooff-popup)
#
# Bind to a key for quick access:
#   bind = $mainMod, SPACE, exec, kitty --title aooff-popup aooff-popup

windowrulev2 = float, title:^(aooff-popup)$
windowrulev2 = size 500 400, title:^(aooff-popup)$
windowrulev2 = move 20 100%-420, title:^(aooff-popup)$
windowrulev2 = pin, title:^(aooff-popup)$
windowrulev2 = stayfocused, title:^(aooff-popup)$
windowrulev2 = dimaround, title:^(aooff-popup)$
